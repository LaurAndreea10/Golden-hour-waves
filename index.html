<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Golden Hour Waves — animated sunset ocean scene with layered golden waves." />
  <title>Golden Hour Waves</title>
  <style>
    :root {
      --sky-top: #48266d;
      --sky-mid: #f06f6f;
      --sun: #ffd36e;
      --sun-core: #fff0a3;
      --gold: #f6b45d;
      --foam: rgba(255, 239, 197, 0.78);
      --sea-1: #2f9eb8;
      --sea-2: #14718d;
      --sea-3: #064d67;
      --ink: #241033;
      --text: #fff9ec;
      --muted: rgba(255, 249, 236, 0.78);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: var(--text);
      overflow: hidden;
      background: #16081f;
    }

    .scene {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 240, 163, 0.26) 0 9rem, transparent 18rem),
        linear-gradient(to bottom, #2b1450 0%, #704080 22%, #e36a77 43%, #f7a55d 58%, #186b85 59%, #06374f 100%);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 14%, rgba(255, 255, 255, 0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 30%, rgba(255, 255, 255, 0.12) 0 1px, transparent 2px),
        linear-gradient(to bottom, rgba(16, 5, 25, 0.2), transparent 40%, rgba(2, 21, 37, 0.45));
      background-size: 210px 210px, 260px 260px, 320px 320px, auto;
      mix-blend-mode: screen;
      opacity: 0.75;
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 24%;
      left: 50%;
      width: clamp(10rem, 22vw, 18rem);
      aspect-ratio: 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        linear-gradient(to bottom, transparent 48%, rgba(20, 83, 106, 0.72) 49% 52%, transparent 53%),
        repeating-linear-gradient(to bottom, transparent 0 14px, rgba(255, 136, 87, 0.16) 15px 20px),
        radial-gradient(circle, var(--sun-core) 0 18%, var(--sun) 38%, #ff9768 68%, rgba(255, 151, 104, 0.2) 70%);
      box-shadow: 0 0 45px rgba(255, 211, 110, 0.6), 0 0 120px rgba(255, 140, 91, 0.48);
      animation: sunPulse 6s ease-in-out infinite alternate;
      z-index: 1;
    }

    .sun::after {
      content: "";
      position: absolute;
      inset: -4rem;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255, 211, 110, 0.22), transparent 64%);
      z-index: -1;
    }

    .horizon {
      position: absolute;
      left: 0;
      right: 0;
      top: 58%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 238, 186, 0.85), transparent);
      box-shadow: 0 0 28px rgba(255, 219, 143, 0.8);
      z-index: 2;
    }

    .reflection {
      position: absolute;
      top: 59%;
      left: 50%;
      width: min(54vw, 34rem);
      height: 38vh;
      transform: translateX(-50%);
      background:
        repeating-linear-gradient(to bottom, rgba(255, 222, 139, 0.64) 0 4px, transparent 5px 21px),
        radial-gradient(ellipse at top, rgba(255, 205, 112, 0.56), transparent 70%);
      clip-path: polygon(42% 0, 58% 0, 88% 100%, 12% 100%);
      filter: blur(0.5px);
      opacity: 0.7;
      mix-blend-mode: screen;
      animation: shimmer 5s ease-in-out infinite alternate;
      z-index: 3;
    }

    .wave-band {
      position: absolute;
      left: -10vw;
      width: 120vw;
      height: 34vh;
      bottom: -6vh;
      z-index: 5;
      opacity: 0.98;
    }

    .wave {
      position: absolute;
      left: 0;
      width: 220vw;
      height: 100%;
      background-repeat: repeat-x;
      background-size: 50vw 100%;
      animation: waveMove 13s linear infinite;
      will-change: transform;
    }

    .wave.one {
      bottom: 14vh;
      height: 22vh;
      opacity: 0.88;
      background-image: radial-gradient(60% 100% at 50% 100%, var(--sea-1) 0 55%, transparent 56%);
      filter: drop-shadow(0 -10px 20px rgba(255, 206, 118, 0.15));
    }

    .wave.two {
      bottom: 6vh;
      height: 25vh;
      opacity: 0.95;
      background-image: radial-gradient(60% 100% at 50% 100%, var(--sea-2) 0 58%, transparent 59%);
      animation-duration: 17s;
      animation-direction: reverse;
    }

    .wave.three {
      bottom: -2vh;
      height: 31vh;
      background-image: radial-gradient(60% 100% at 50% 100%, var(--sea-3) 0 62%, transparent 63%);
      animation-duration: 22s;
    }

    .foam {
      position: absolute;
      left: -20vw;
      right: -20vw;
      bottom: 28vh;
      height: 9vh;
      background:
        radial-gradient(35px 16px at 40px 45px, var(--foam) 0 45%, transparent 47%),
        radial-gradient(54px 18px at 120px 30px, rgba(255,255,255,0.55) 0 44%, transparent 46%),
        radial-gradient(42px 15px at 210px 50px, rgba(255, 239, 197, 0.58) 0 48%, transparent 50%);
      background-size: 260px 75px;
      opacity: 0.8;
      animation: foamSlide 9s linear infinite;
      z-index: 6;
      filter: blur(0.2px);
    }

    .content {
      position: relative;
      z-index: 10;
      width: min(92vw, 980px);
      transform: translateY(-9vh);
      text-align: center;
      padding: clamp(1.2rem, 3vw, 2rem);
      pointer-events: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 0.85rem;
      border: 1px solid rgba(255, 238, 186, 0.36);
      border-radius: 999px;
      background: rgba(36, 16, 51, 0.28);
      backdrop-filter: blur(14px);
      color: #ffe7a7;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: clamp(0.68rem, 1.7vw, 0.78rem);
    }

    h1 {
      margin: 1rem auto 0;
      font-size: clamp(4.1rem, 14vw, 12rem);
      line-height: 0.76;
      letter-spacing: -0.105em;
      text-transform: uppercase;
      text-shadow: 0 9px 0 rgba(54, 17, 51, 0.22), 0 30px 80px rgba(18, 8, 31, 0.38);
    }

    h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 249, 236, 0.48);
      background: linear-gradient(180deg, #fff8cf 0%, #ffd36e 34%, #ff9b68 62%, #fed1b0 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 40rem;
      margin: 1.3rem auto 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: clamp(1rem, 2vw, 1.22rem);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.35);
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.65rem;
      pointer-events: auto;
    }

    .links a {
      color: var(--text);
      text-decoration: none;
      padding: 0.72rem 1rem;
      border: 1px solid rgba(255, 238, 186, 0.34);
      border-radius: 999px;
      background: rgba(36, 16, 51, 0.32);
      backdrop-filter: blur(14px);
      font-weight: 800;
      transition: transform 180ms ease, background 180ms ease;
    }

    .links a:hover,
    .links a:focus-visible {
      transform: translateY(-3px);
      background: rgba(255, 211, 110, 0.19);
      outline: 2px solid rgba(255, 238, 186, 0.55);
      outline-offset: 3px;
    }

    .grain {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      opacity: 0.11;
      z-index: 20;
      background-image:
        linear-gradient(115deg, transparent 0 48%, rgba(255,255,255,0.12) 49% 51%, transparent 52% 100%),
        radial-gradient(circle, rgba(255,255,255,0.18) 0 1px, transparent 1.5px);
      background-size: 13px 13px, 31px 31px;
      animation: grain 0.9s steps(2) infinite;
      mix-blend-mode: overlay;
    }

    @keyframes sunPulse {
      from { transform: translateX(-50%) scale(0.985); filter: saturate(1); }
      to { transform: translateX(-50%) scale(1.025); filter: saturate(1.18); }
    }

    @keyframes shimmer {
      from { opacity: 0.48; transform: translateX(-50%) scaleX(0.92); }
      to { opacity: 0.78; transform: translateX(-50%) scaleX(1.06); }
    }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50vw); }
    }

    @keyframes foamSlide {
      from { transform: translateX(0); }
      to { transform: translateX(-260px); }
    }

    @keyframes grain {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(2%, -2%, 0); }
    }

    @media (max-width: 720px) {
      .content { transform: translateY(-7vh); }
      .sun { top: 28%; }
      p { max-width: 31rem; }
      .wave-band { height: 38vh; }
      .foam { bottom: 29vh; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-labelledby="title">
    <div class="sun" aria-hidden="true"></div>
    <div class="horizon" aria-hidden="true"></div>
    <div class="reflection" aria-hidden="true"></div>

    <section class="content">
      <div class="tag">🌅 CSS ocean scene</div>
      <h1 id="title">Golden <span>Hour Waves</span></h1>
      <p>
        Sunset gradients, glowing reflection and layered animated waves — a portfolio-ready visual experiment inspired by a CodePen mood scene.
      </p>
      <div class="links" aria-label="Project links">
        <a href="https://github.com/LaurAndreea10/Golden-hour-waves">GitHub</a>
        <a href="https://laurandreea10.github.io/codepen-portfolio/">Portfolio</a>
      </div>
    </section>

    <div class="wave-band" aria-hidden="true">
      <div class="foam"></div>
      <div class="wave one"></div>
      <div class="wave two"></div>
      <div class="wave three"></div>
    </div>
    <div class="grain" aria-hidden="true"></div>
  </main>
</body>
</html>
